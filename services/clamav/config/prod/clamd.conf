# ═══════════════════════════════════════════════════════════════
# ClamAV — PROD Configuration (clamd.conf)
# ═══════════════════════════════════════════════════════════════

# Socket configuration
TCPSocket 3310
TCPAddr 0.0.0.0
LocalSocket /tmp/clamd.sock
FixStaleSocket yes

# Disable concurrent database reloading to halve memory spikes
# (Scans will be temporarily blocked during reload)
ConcurrentDatabaseReload no

# Memory/Performance tuning
MaxThreads 4
MaxConnectionQueueLength 20

# Regular scanning limits
MaxFileSize 100M
MaxScanSize 200M
MaxFiles 10000
