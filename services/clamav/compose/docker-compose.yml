# ═══════════════════════════════════════════════════════════════
# ClamAV — BASE Compose (common service definition)
# ═══════════════════════════════════════════════════════════════

services:
  clamav:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../env/${APP_ENV:-prod}.env
    volumes:
      - ${DATA_PATH_BASE}/clam_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: ${HEALTHCHECK_INTERVAL:-60s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START:-5m}
    labels:
      com.project.service: "clamav"
      com.project.managed-by: "docker-compose"
    networks:
      - clam_internal
      - gateway

networks:
  clam_internal:
    external: true
  gateway:
    external: true

