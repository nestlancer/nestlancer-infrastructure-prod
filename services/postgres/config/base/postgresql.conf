# ═══════════════════════════════════════════════════════════════
# PostgreSQL — BASE Configuration
# Shared settings across all environments
# Environment-specific overrides are appended by entrypoint.sh
# ═══════════════════════════════════════════════════════════════

# ── Connection & Authentication ──
listen_addresses = '*'
port = 5432
max_connections = 100

# ── Locale & Formatting ──
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# ── Memory (reasonable defaults) ──
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB

# ── WAL ──
wal_level = replica
max_wal_senders = 3
wal_keep_size = 64MB

# ── Checkpoints ──
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# ── Logging (base defaults) ──
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_timezone = 'UTC'

# ── Statistics ──
track_activities = on
track_counts = on
track_io_timing = on

# ── Autovacuum ──
autovacuum = on
 
# ── Auto-Configuration ──
include 'postgresql.auto.conf'
