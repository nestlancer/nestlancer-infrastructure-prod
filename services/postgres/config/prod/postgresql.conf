# ═══════════════════════════════════════════════════════════════
# PostgreSQL — PROD Configuration Overrides
# Performance tuning, SSL, minimal logging, WAL archiving
# ═══════════════════════════════════════════════════════════════

# ── Logging (production — minimal, slow query only) ──
log_statement = 'none'
log_duration = off
log_min_duration_statement = 500
log_connections = off
log_disconnections = off
log_lock_waits = on

# ── Memory (tuned for production) ──
shared_buffers = 256MB
work_mem = 64MB
maintenance_work_mem = 256MB
effective_cache_size = 768MB
max_connections = 100
wal_buffers = 16MB

# ── WAL & Durability ──
wal_level = replica
synchronous_commit = on
full_page_writes = on
wal_compression = on
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/backups/archive/%f && cp %p /var/lib/postgresql/backups/archive/%f'

# ── Performance ──
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100
checkpoint_completion_target = 0.9
max_wal_size = 512MB

# ── SSL ──
ssl = on
ssl_cert_file = '/var/lib/postgresql/data/server.crt'
ssl_key_file = '/var/lib/postgresql/data/server.key'

# ── Security ──
password_encryption = 'scram-sha-256'

# ── pg_stat_statements ──
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
