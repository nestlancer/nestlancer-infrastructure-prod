# ═══════════════════════════════════════════════════════════════
# Redis Cache — BASE Configuration
# Shared settings across all environments
# ═══════════════════════════════════════════════════════════════

# ── Network ──
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 128
timeout 300
tcp-keepalive 60

# ── General ──
daemonize no
loglevel notice
databases 16

# ── Snapshotting (base — overridden per env) ──
# Default: save after 3600s if 1 key changed
save 3600 1

# ── Memory (base defaults — overridden per env) ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Append Only File (disabled by default) ──
appendonly no

# ── Clients ──
maxclients 10000

# ── Keyspace notifications (disabled for cache) ──
notify-keyspace-events ""

# ── Slow log ──
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency monitor ──
latency-monitor-threshold 100
