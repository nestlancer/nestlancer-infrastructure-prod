# ═══════════════════════════════════════════════════════════════
# Redis Cache — PROD Configuration Overrides
# Password, LFU eviction, RDB snapshots, renamed dangerous cmds
# ═══════════════════════════════════════════════════════════════

# ── Logging ──
loglevel warning

# ── Auth ──
# requirepass removed - now injected from ENV by entrypoint.sh

# ── Memory ──
maxmemory 400mb
maxmemory-policy allkeys-lfu

# ── Persistence (RDB snapshots + AOF) ──
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# ── Performance & Eviction ──
io-threads 4
io-threads-do-reads yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Security (rename dangerous commands) ──
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""
