# ═══════════════════════════════════════════════════════════════
# Redis Pub/Sub — BASE Configuration
# Optimized for pub/sub workloads: no persistence, high hz
# ═══════════════════════════════════════════════════════════════

# ── Network ──
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 60

# ── General ──
daemonize no
loglevel notice
databases 16
hz 100

# ── Persistence (DISABLED for pub/sub) ──
save ""
appendonly no
rdbchecksum no

# ── Memory ──
maxmemory 128mb
maxmemory-policy noeviction

# ── Clients ──
maxclients 10000

# ── Keyspace notifications (enabled for pub/sub) ──
notify-keyspace-events KEA

# ── Slow log ──
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency monitor ──
latency-monitor-threshold 100
