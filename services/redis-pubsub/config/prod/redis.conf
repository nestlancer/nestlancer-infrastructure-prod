# ═══════════════════════════════════════════════════════════════
# Redis Pub/Sub — PROD Configuration Overrides
# Password, warning logging, renamed dangerous commands
# ═══════════════════════════════════════════════════════════════

loglevel warning
# requirepass removed - now injected from ENV by entrypoint.sh
maxmemory 200mb
maxmemory-policy noeviction

# Multi-threading for high throughput
io-threads 4
io-threads-do-reads yes
hz 500

# Persistence fully disabled
save ""

# Security (rename dangerous commands)
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""
